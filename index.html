<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fylo Data Storage Component</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="storage-container">
    <!-- Carte de gauche -->
    <div class="logo-card">
        <div class="logo">
            <svg width="135" height="40" viewBox="0 0 135 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 0H135V40H0V0Z" fill="none"/>
                <path d="M16 12L27 4L38 12L27 20L16 12Z" fill="white"/>
                <path d="M38 28L27 36L16 28L27 20L38 28Z" fill="white"/>
                <text x="50" y="28" fill="white" font-size="24" font-weight="bold">Fylo</text>
            </svg>
        </div>
        <div class="icons">
            <div class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M19 10H5C3.9 10 3 10.9 3 12V20C3 21.1 3.9 22 5 22H19C20.1 22 21 21.1 21 20V12C21 10.9 20.1 10 19 10Z" stroke="white" stroke-width="1.5" fill="none"/>
                    <path d="M7 10V6C7 3.79 8.79 2 11 2H13C15.21 2 17 3.79 17 6V10" stroke="white" stroke-width="1.5" fill="none"/>
                </svg>
            </div>
            <div class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M21 15V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V15" stroke="white" stroke-width="1.5" fill="none"/>
                    <path d="M7 10L12 15L17 10" stroke="white" stroke-width="1.5" fill="none"/>
                    <path d="M12 15V3" stroke="white" stroke-width="1.5" fill="none"/>
                </svg>
            </div>
            <div class="icon-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M14 2H6C5.5 2 5 2.5 5 3V21C5 21.5 5.5 22 6 22H18C18.5 22 19 21.5 19 21V8L14 2Z" stroke="white" stroke-width="1.5" fill="none"/>
                    <path d="M14 2V8H20" stroke="white" stroke-width="1.5" fill="none"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- Carte de droite avec la barre de progression -->
    <div class="storage-card">
        <div class="storage-text">
            You've used <span id="used-storage">0</span> GB of your storage
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>

        <div class="storage-limits">
            <span>0 GB</span>
            <span>1000 GB</span>
        </div>

        <div class="info-bubble">
            <span class="gb-left" id="gb-left">0</span>
            <span class="gb-text">GB LEFT</span>
        </div>
    </div>
</div>

<script>
    // Configuration
    const maxStorage = 1000;
    let currentStorage = 815; 

    // Éléments DOM
    const progressFill = document.getElementById('progress-fill');
    const usedStorageSpan = document.getElementById('used-storage');
    const gbLeftSpan = document.getElementById('gb-left');

    // Mettre à jour l'affichage
    function updateProgress(storageUsed) {
        const percentage = (storageUsed / maxStorage) * 100;
        progressFill.style.width = percentage + '%';
        usedStorageSpan.textContent = storageUsed;
        gbLeftSpan.textContent = maxStorage - storageUsed;
    }

    // Animation au chargement
    setTimeout(() => {
        updateProgress(currentStorage);
    }, 100);



</script>
</body>
</html>
